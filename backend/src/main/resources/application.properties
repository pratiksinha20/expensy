# ── Server ────────────────────────────────────────────────
server.port=8080

# ── PostgreSQL ────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/pricecomp
spring.datasource.username=postgres
spring.datasource.password=PratikSinha@21
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Run schema.sql on startup (creates tables if not present)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ── CORS ──────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ── Scraper ───────────────────────────────────────────────
# How often to re-scrape prices (cron: every 6 hours)
app.scraper.cron=0 0 */6 * * *
app.scraper.user-agent=Mozilla/5.0 (compatible; PriceBot/1.0)
app.scraper.timeout-ms=10000
